services:
  mediaforge:
    build: .
    container_name: mediaforge
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8686:8686"
    environment:
      - TZ=America/Toronto
      - PUID=1000
      - PGID=1000
      - SECRET_KEY=change-me-run-openssl-rand-hex-32
      - JELLYFIN_URL=http://192.168.2.50:8096
      - JELLYFIN_API_KEY=
      - TMDB_API_KEY=
      - VPN_PROVIDER=
      - VPN_TYPE=wireguard
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/config
      - /mnt/media:/media
      - /mnt/downloads:/downloads
    restart: unless-stopped
