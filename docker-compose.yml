services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: mediaforge-jellyfin
    environment:
      - TZ=America/Toronto
      - PUID=1000
      - PGID=1000
    ports:
      - "8096:8096"
    volumes:
      - ./jellyfin-config:/config
      - ./jellyfin-cache:/cache
      - /mnt/media:/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mediaforge:
    build: .
    container_name: mediaforge
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8686:8686"
    environment:
      - TZ=America/Toronto
      - PUID=1000
      - PGID=1000
      - JELLYFIN_URL=http://jellyfin:8096
      - LOG_LEVEL=info
    volumes:
      - ./config:/config
      - /mnt/media:/media
      - /mnt/downloads:/downloads
    depends_on:
      jellyfin:
        condition: service_healthy
    restart: unless-stopped
