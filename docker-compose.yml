services:
  mediaforge:
    build: .
    image: mediaforge:latest
    container_name: mediaforge
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8686:8686"
    environment:
      - TZ=America/Toronto
      - PUID=1000
      - PGID=1000
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgresql+asyncpg://mediaforge:mediaforge@db:5432/mediaforge
      - REDIS_URL=redis://redis:6379/0
      - JELLYFIN_URL=${JELLYFIN_URL:-}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - VPN_PROVIDER=${VPN_PROVIDER:-}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      - VPN_CONFIG_PATH=/config/vpn/wg0.conf
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./config:/config
      - /mnt/media:/media
      - /mnt/downloads:/downloads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: mediaforge-db
    environment:
      - POSTGRES_USER=mediaforge
      - POSTGRES_PASSWORD=mediaforge
      - POSTGRES_DB=mediaforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediaforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mediaforge-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
